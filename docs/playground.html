<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exprify Playground</title>
  <link rel="stylesheet" href="style/playground.css" />
</head>
<body>
<div class="sidebar">
  <h2>Exprify</h2>
  <div>
    <h3>Examples</h3>
    <ul class="examples-list" id="examples"></ul>
  </div>
  <div>
    <h3>Variables</h3>
    <table class="vars-table"><thead><tr><th>Name</th><th>Value</th></tr></thead><tbody id="vars-body"></tbody></table>
  </div>
</div>
<div class="main">
  <div class="output" id="output"><div class="entry"><span class="prompt">// </span><span class="result" style="color:#888">Exprify REPL — type an expression and press Enter</span></div></div>
  <div class="input-area"><span class="prompt">&gt;</span><input type="text" id="input" placeholder="e.g. 2 + 2" autofocus spellcheck="false" autocomplete="off"></div>
</div>
<script  type="module" src="script/playground.js"></script>
</body>
</html>
